    group: no-credentials
    goal: "demo 表单提交前补充 PIPL 最小告知（收集项/用途/保存期限/权利通道）"
    outputs:
      - site/demo.html

  - id: KSR-CONTENT-LOGIN-CONSISTENCY
    status: done
    done_date: "2026-03-11"
