# ─────────────────────────────────────────────────────────────
# 分组说明
# group: no-credentials  — 无需生产权限，立即可执行
# group: needs-db        — 需 DB 只读或 DDL 权限
# group: needs-deploy    — 需仓库/发布/CI 权限
# group: needs-approval  — 需管理层或法务批准
# ─────────────────────────────────────────────────────────────

tasks:

  # ── 已完成 ───────────────────────────────────────────────
  - id: KSR-ROBOTS-SITEMAP-FIX
    status: done
    done_date: "2026-03-11"
