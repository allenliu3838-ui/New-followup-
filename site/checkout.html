<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>支付中心 · 肾域·科研</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="https://kidneysphere.com/shared/ks-topbar.css">
  <link rel="stylesheet" href="https://kidneysphere.com/shared/ks-brand.css">
  <script src="https://kidneysphere.com/shared/ks-topbar.js" defer></script>
  <link rel="stylesheet" href="/app.css"/>
  <link rel="icon" href="/assets/kidneysphere-ai.png"/>
  <style>
    .step { display:none; }
    .step.active { display:block; }
    .step-indicator { display:flex; gap:6px; margin-bottom:14px; }
    .step-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--border);
                display:flex; align-items:center; justify-content:center;
                font-size:13px; font-weight:700; color:var(--muted); }
    .step-dot.active { border-color:var(--brand); color:var(--brand); background:rgba(47,111,235,.08); }
    .step-dot.done { border-color:var(--ok); color:#fff; background:var(--ok); }
    .step-line { flex:1; height:2px; background:var(--border); align-self:center; }

    .pay-tabs { display:flex; gap:0; margin:12px 0; border-radius:12px; overflow:hidden; border:1px solid var(--border); }
    .pay-tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:14px; font-weight:600;
               background:#fff; border-right:1px solid var(--border); transition:background .15s; }
    .pay-tab:last-child { border-right:none; }
    .pay-tab:hover { background:rgba(47,111,235,.04); }
    .pay-tab.active { background:rgba(47,111,235,.08); color:var(--brand); }
    .pay-tab .tab-icon { font-size:20px; display:block; margin-bottom:2px; }

    .pay-panel { display:none; }
    .pay-panel.active { display:block; }

    .qr-box { text-align:center; padding:16px; }
    .qr-box img { max-width:260px; border-radius:14px; border:1px solid var(--border); }

    .amount-big { font-size:28px; font-weight:900; color:var(--brand); margin:8px 0; }
    .copy-btn { display:inline-flex; align-items:center; gap:4px; font-size:12px; cursor:pointer;
                border:1px solid var(--border); border-radius:8px; padding:3px 8px; background:#fff; color:var(--muted); }
    .copy-btn:hover { border-color:rgba(47,111,235,.35); color:var(--brand); }

    .bank-info { background:rgba(37,99,235,.04); border:1px solid rgba(37,99,235,.15);
                 border-radius:14px; padding:14px; }
    .bank-info .kv { grid-template-columns:100px 1fr; gap:6px 12px; }

    .price-calc { background:rgba(37,99,235,.04); border:1px solid rgba(37,99,235,.12);
                  border-radius:14px; padding:14px; margin-top:10px; }

    .order-status-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:14px;
                         padding:14px; margin-top:10px; }

    .upload-zone { border:2px dashed var(--border); border-radius:14px; padding:20px;
                   text-align:center; cursor:pointer; transition:border-color .2s; }
    .upload-zone:hover { border-color:rgba(47,111,235,.4); }
    .upload-zone.has-file { border-color:var(--ok); background:rgba(22,163,74,.04); }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="card">
      <div class="brand">
        <img src="/assets/kidneysphere-ai.png" alt="肾域·科研"/>
        <div>
          <h1 class="brand-title">支付中心</h1>
          <div class="brand-sub">升级 Pro · 支持微信 / 支付宝 / 对公转账</div>
        </div>
      </div>
      <div class="btnbar" style="margin-top:12px">
        <a class="btn" href="/">返回首页</a>
        <a class="btn" href="/pricing">价格方案</a>
        <a class="btn" href="/staff">工作台</a>
      </div>
    </div>

    <!-- 未登录提示 -->
    <div class="card" id="loginPrompt" data-testid="checkout-login-prompt" style="display:none">
      <div class="warnbox">
        请先 <a href="/login?returnTo=/checkout" data-testid="checkout-login-link">登录</a> 后再进行升级购买。
        <div class="small muted" style="margin-top:6px">登录后将自动返回此页面。</div>
      </div>
    </div>

    <!-- 主内容容器（content injected from template after auth） -->
    <div id="checkoutMain" data-testid="checkout-main" style="display:none"></div>

    <template id="checkoutTpl">
      <!-- Step Indicator -->
      <div class="card">
        <div class="step-indicator">
          <div class="step-dot active" id="dot1">1</div>
          <div class="step-line"></div>
          <div class="step-dot" id="dot2">2</div>
          <div class="step-line"></div>
          <div class="step-dot" id="dot3">3</div>
          <div class="step-line"></div>
          <div class="step-dot" id="dot4">4</div>
        </div>
        <div id="stepLabel" class="muted small">第 1 步：选择方案</div>
      </div>

      <!-- ===== Step 1: 选择方案 ===== -->
      <div class="card step active" id="step1">
        <h2 style="margin:0 0 8px">选择方案</h2>

        <div class="row">
          <div class="col">
            <label>套餐</label>
            <select id="planCode">
              <option value="pro">Pro（个人/小团队）</option>
              <option value="institutional" disabled>机构版（请联系报价）</option>
            </select>
          </div>
          <div class="col">
            <label>计费周期</label>
            <select id="billingCycle">
              <option value="monthly">月付</option>
              <option value="yearly">年付（约 8 折）</option>
            </select>
          </div>
          <div class="col">
            <label>项目数量</label>
            <div style="display:flex;align-items:center;gap:8px">
              <button class="btn small" id="btnProjMinus" style="width:36px">−</button>
              <input id="projectCount" type="number" min="3" max="30" value="3"
                     style="width:70px;text-align:center"/>
              <button class="btn small" id="btnProjPlus" style="width:36px">+</button>
            </div>
            <div class="muted small" style="margin-top:4px">基础含 3 个项目</div>
          </div>
        </div>

        <div class="price-calc" id="priceCalc">
          <div style="display:flex;align-items:baseline;gap:8px">
            <span class="amount-big" id="totalPrice">¥499</span>
            <span class="muted small" id="priceUnit">/ 月</span>
          </div>
          <div class="small" id="priceBreakdown">基础 ¥499 + 额外 0 个项目 × ¥99 = ¥499</div>
        </div>

        <div class="btnbar">
          <button class="btn primary" id="btnToStep2">下一步：填写信息</button>
        </div>
      </div>

      <!-- ===== Step 2: 填写订单信息 ===== -->
      <div class="card step" id="step2">
        <h2 style="margin:0 0 8px">订单信息</h2>
        <div class="muted small" style="margin-bottom:10px">以下为选填，方便我们联系和开票。</div>

        <div class="row">
          <div class="col">
            <label>购买人姓名（选填）</label>
            <input id="payerName" placeholder="例如：张三"/>
          </div>
          <div class="col">
            <label>邮箱</label>
            <input id="payerEmail" type="email" readonly/>
          </div>
          <div class="col">
            <label>单位 / 医院（选填）</label>
            <input id="payerHospital" placeholder="例如：北京协和医院"/>
          </div>
        </div>

        <div class="hr"></div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <label style="margin:0">需要发票吗？</label>
          <select id="invoiceNeeded" style="width:100px">
            <option value="no">不需要</option>
            <option value="yes">需要</option>
          </select>
        </div>

        <div id="invoiceFields" style="display:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <label style="margin:0;white-space:nowrap">发票类型</label>
            <select id="invoiceType" style="width:140px">
              <option value="personal">个人</option>
              <option value="company">单位 / 企业</option>
            </select>
            <span class="muted small" id="invoiceTypeHint">个人发票无需税号</span>
          </div>
          <div class="row">
            <div class="col">
              <label id="invoiceTitleLabel">发票抬头</label>
              <input id="invoiceTitle" placeholder="您的真实姓名"/>
            </div>
            <div class="col" id="invoiceTaxNoCol">
              <label>税号</label>
              <input id="invoiceTaxNo" placeholder="统一社会信用代码"/>
            </div>
            <div class="col">
              <label>收票邮箱</label>
              <input id="invoiceEmail" type="email" placeholder="接收电子发票的邮箱"/>
            </div>
          </div>
        </div>

        <label>备注（选填）</label>
        <input id="orderNotes" placeholder="例如：课题编号、特殊需求等"/>

        <div style="margin-top:12px">
          <label style="display:flex;align-items:flex-start;gap:6px;cursor:pointer;margin:0">
            <input type="checkbox" id="agreeTermsCheckout" style="width:auto;margin-top:2px"/>
            <span class="small">我已阅读并同意 <a href="/terms" target="_blank">用户协议</a> 和 <a href="/privacy" target="_blank">隐私政策</a></span>
          </label>
        </div>

        <div class="btnbar">
          <button class="btn" id="btnBackTo1">上一步</button>
          <button class="btn primary" id="btnToStep3">下一步：选择付款方式</button>
        </div>
      </div>

      <!-- ===== Step 3: Payment info injected dynamically after order creation ===== -->
      <div class="card step" id="step3">
        <div id="step3Content" data-testid="step3-payment">
          <div class="muted small">请先完成前两步以查看付款信息。</div>
        </div>
      </div>

      <!-- ===== Step 4: 等待开通 ===== -->
      <div class="card step" id="step4">
        <h2 style="margin:0 0 8px">凭证已提交，等待核验</h2>
        <div class="order-status-card">
          <div class="kv" style="grid-template-columns:100px 1fr">
            <div class="muted small">订单号</div><div id="s4OrderNo"></div>
            <div class="muted small">套餐</div><div id="s4Plan"></div>
            <div class="muted small">项目配额</div><div id="s4Quota"></div>
            <div class="muted small">应付金额</div><div id="s4Amount"></div>
            <div class="muted small">付款方式</div><div id="s4Method"></div>
            <div class="muted small">当前状态</div><div id="s4Status"></div>
          </div>
        </div>
        <div class="infobox small" style="margin-top:10px">
          平台将在 1–2 个工作日内核验您的付款凭证。核验通过后，权益将自动开通，届时会通过邮件通知您。<br/>
          如有问题请联系：<span id="s4Contact"></span>
        </div>
        <div class="btnbar">
          <a class="btn primary" href="/staff">返回工作台</a>
          <a class="btn" href="/">返回首页</a>
        </div>
      </div>

      <!-- ===== 我的订单 ===== -->
      <div class="card" id="myOrdersCard">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <h2 style="margin:0">我的订单</h2>
          <button class="btn small" id="btnRefreshOrders">刷新</button>
        </div>
        <div id="myOrdersList" data-testid="my-orders" class="muted small"></div>
      </div>

    </template><!-- /checkoutTpl -->
  </div>

  <footer class="site-footer">
    <div>微信：GlomConChina1 · 邮箱：<a href="mailto:china@kidneysphere.com">china@kidneysphere.com</a></div>
    <div style="margin-top:4px">© 2025–2026 上海胤域医学科技有限公司 · 肾域·科研 · <a href="/security">安全合规</a> · <a href="/privacy">隐私政策</a> · <a href="/terms">用户协议</a> · <a href="/disclaimer">免责声明</a> · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">沪ICP备2026008040号-1</a></div>
  </footer>

  <script src="/lib/error-logger.js"></script>
  <script src="/config.js"></script>
  <script type="module" src="/checkout.js"></script>
  <script src="/analytics.js"></script>
</body>
</html>
