[build]
  publish = "site"
  command = "echo 'no build'"

[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[[redirects]]
  from = "/signup"
  to   = "/signup.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/disclaimer"
  to   = "/disclaimer.html"
  status = 200

[[redirects]]
  from = "/auth/callback"
  to   = "/auth-callback.html"
  status = 200

[[redirects]]
  from = "/staff"
  to   = "/staff.html"
  status = 200

[[redirects]]
  from = "/staff/*"
  to   = "/staff.html"
  status = 200

[[redirects]]
  from = "/guide"
  to   = "/guide.html"
  status = 200

[[redirects]]
  from = "/guide/*"
  to   = "/guide.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to   = "/checkout.html"
  status = 200

[[redirects]]
  from = "/checkout/*"
  to   = "/checkout.html"
  status = 200

[[redirects]]
  from = "/followup"
  to   = "/patient.html"
  status = 200

[[redirects]]
  from = "/p/*"
  to   = "/patient.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://kidneysphere.com https://plausible.io; style-src 'self' 'unsafe-inline' https://kidneysphere.com; img-src 'self' data: https://*.supabase.co https://kidneysphere.com; connect-src 'self' https://*.supabase.co https://plausible.io; font-src 'self' https://kidneysphere.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Prevent browser from serving stale JS/HTML after deploys
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
