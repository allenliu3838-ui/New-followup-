server {
    listen 80;
    listen [::]:80;
    # server_name your-domain.com;  # 有域名时取消注释并替换

    root /var/www/kidneysphere/site;
    index index.html;
    charset utf-8;

    # ── 安全头 ──────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── 缓存策略 ────────────────────────────────────────────
    # JS/HTML 不缓存，确保部署后立即生效
    location ~* \.(js|html)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # 静态资源（CSS/图片/字体）缓存 7 天
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── URL 重写（对应 Netlify redirects）────────────────────
    location = /staff {
        try_files /staff.html =404;
    }
    location /staff/ {
        rewrite ^/staff/.*$ /staff.html last;
    }

    location = /guide {
        try_files /guide.html =404;
    }
    location /guide/ {
        rewrite ^/guide/.*$ /guide.html last;
    }

    location = /checkout {
        try_files /checkout.html =404;
    }
    location /checkout/ {
        rewrite ^/checkout/.*$ /checkout.html last;
    }

    location = /followup {
        try_files /patient.html =404;
    }
    location /p/ {
        rewrite ^/p/.*$ /patient.html last;
    }

    # ── 默认：所有未匹配路径返回 index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 禁止访问隐藏文件 ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Gzip 压缩 ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/xml;
    gzip_min_length 1024;
    gzip_vary on;
}
